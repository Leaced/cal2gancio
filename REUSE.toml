# https://reuse.software/spec/
#
# Validate with:  reuse lint
# Generate SBOM:  reuse spdx

version = 1

[[annotations]]
path = "ical2gancio/**/*.py"
SPDX-FileCopyrightText = "Contributors to ical2gancio"
SPDX-License-Identifier = "EUPL-1.2"

[[annotations]]
path = "ical2gancio/__init__.py"
SPDX-FileCopyrightText = "Contributors to ical2gancio"
SPDX-License-Identifier = "EUPL-1.2"

[[annotations]]
path = [
    "Containerfile",
    ".containerignore",
    "requirements.txt",
    "renovate.json",
    ".releaserc.json",
    ".github/**",
]
SPDX-FileCopyrightText = "Contributors to ical2gancio"
SPDX-License-Identifier = "EUPL-1.2"

[[annotations]]
path = [
    "README.md",
    "config.yml",
]
SPDX-FileCopyrightText = "Contributors to ical2gancio"
SPDX-License-Identifier = "EUPL-1.2"

# The license text itself is not licensed
[[annotations]]
path = "LICENSES/EUPL-1.2.txt"
SPDX-FileCopyrightText = "Creative Commons Corporation"
SPDX-License-Identifier = "LicenseRef-scancode-public-domain"
