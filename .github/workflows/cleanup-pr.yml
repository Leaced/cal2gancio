name: Cleanup PR images

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Delete PR container image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          PACKAGE="${GITHUB_REPOSITORY##*/}"
          PREFIX="pr-${PR_NUMBER}-"

          # Only delete versions where every tag belongs to this PR.
          # Versions also tagged as latest, main, or vX.Y.Z are skipped.
          gh api "/user/packages/container/${PACKAGE}/versions" --paginate \
            --jq ".[] | select(
              (.metadata.container.tags | length > 0) and
              (.metadata.container.tags | all(startswith(\"${PREFIX}\")))
            ) | .id" | \
          while IFS= read -r version_id; do
            echo "Deleting version ${version_id} (only has ${PREFIX}* tags)"
            gh api --method DELETE \
              "/user/packages/container/${PACKAGE}/versions/${version_id}" \
              && echo "  Deleted." || echo "  Could not delete — skipping."
          done
