name: _build-scan (reusable)

# Called by ci.yml. Builds a single-arch image, pushes it, then runs Trivy.
# Pipeline fails on CRITICAL or HIGH vulnerabilities where a fix is available
# (--ignore-unfixed skips issues with no upstream patch yet).

on:
  workflow_call:
    inputs:
      tags:
        description: "Image tags to build and push (one per line)"
        required: true
        type: string
      scan-ref:
        description: "Full image reference used for the Trivy scan"
        required: true
        type: string

jobs:
  build-push-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      security-events: write   # upload SARIF to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2.13
        with:
          tags:           ${{ inputs.tags }}
          platforms:      linux/amd64
          containerfiles: ./Containerfile
          oci:            true

      - name: Push image
        uses: redhat-actions/push-to-registry@v2.8
        with:
          tags:     ${{ steps.build.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref:      ${{ inputs.scan-ref }}
          format:         sarif
          output:         trivy-results.sarif
          ignore-unfixed: true
          vuln-type:      "os,library"
          severity:       "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on fixable CRITICAL/HIGH vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref:      ${{ inputs.scan-ref }}
          format:         table
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      "os,library"
          severity:       "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
