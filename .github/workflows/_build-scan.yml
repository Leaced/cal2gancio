name: _build-scan (reusable)

# Called by ci.yml. Computes image tags, builds a single-arch OCI image,
# pushes it to ghcr.io, then runs Trivy.
# Pipeline fails on CRITICAL or HIGH vulnerabilities where a fix is available
# (--ignore-unfixed skips issues with no upstream patch yet).

on:
  workflow_call:
    outputs:
      scan-ref:
        description: "Full image reference that was built and pushed"
        value: ${{ jobs.build-push-scan.outputs.scan-ref }}

jobs:
  build-push-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read            # codeql-action/upload-sarif needs this for workflow metadata
      id-token: write          # cosign: OIDC token for keyless signing
    outputs:
      scan-ref: ${{ steps.tags.outputs.scan-ref }}

    steps:
      - name: Compute image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::8}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SCAN_REF="${IMAGE}:pr-${{ github.event.number }}-${SHA}"
            TAGS="${SCAN_REF}"
          else
            SCAN_REF="${IMAGE}:main-${SHA}"
            TAGS="${SCAN_REF}"$'\n'"${IMAGE}:main"
          fi

          echo "scan-ref=${SCAN_REF}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          tags:           ${{ steps.tags.outputs.tags }}
          platforms:      linux/amd64
          containerfiles: ./Containerfile
          oci:            true

      - name: Push image
        id: push
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          tags:     ${{ steps.build.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with Cosign (keyless)
        continue-on-error: true
        run: |
          cosign sign --yes \
            "ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_REGISTRY_USERNAME: ${{ github.actor }}
          COSIGN_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref:      ${{ steps.tags.outputs.scan-ref }}
          format:         sarif
          output:         trivy-results.sarif
          ignore-unfixed: true
          vuln-type:      "os,library"
          severity:       "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on fixable CRITICAL/HIGH vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref:      ${{ steps.tags.outputs.scan-ref }}
          format:         table
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      "os,library"
          severity:       "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
